# Quick plain-AKT ablation on the bundled sample dataset.
# Same pipeline as configs/test.yaml, but the difficulty enhancement is disabled.
raw_csv: data/sample_interactions.csv
processed_dir: data/processed_test_plain
save_dir: outputs/test_plain_akt
seed: 3407
device: auto
deterministic: false
torch_num_threads: 1

seq_len: 50
min_seq_len: 3
valid_ratio: 0.1
test_ratio: 0.2
rebuild_processed: true

use_difficulty: false
n_difficulty_bins: 10
generate_diagnosis: true

d_model: 64
d_ff: 128
n_blocks: 2
num_attn_heads: 4
dropout: 0.2
separate_qa: true
use_rasch: true

batch_size: 32
epochs: 3
lr: 0.001
weight_decay: 0.00001
grad_clip: 1.0
patience: 3
num_workers: 0
