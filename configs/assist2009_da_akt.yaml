raw_csv: data/assist2009.csv
processed_dir: data/processed_assist2009
save_dir: outputs/assist2009_da_akt
seed: 3407
device: auto
deterministic: false
torch_num_threads: 1

seq_len: 100
min_seq_len: 3
valid_ratio: 0.1
test_ratio: 0.2
rebuild_processed: true

# DA-AKT enhancement
use_difficulty: true
n_difficulty_bins: 10
generate_diagnosis: true

# model
d_model: 128
d_ff: 256
n_blocks: 2
num_attn_heads: 8
dropout: 0.2
separate_qa: true
use_rasch: true

# training
batch_size: 64
epochs: 100
lr: 0.001
weight_decay: 0.00001
grad_clip: 1.0
patience: 10
num_workers: 0
